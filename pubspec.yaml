name: onemusic
description: Ad-free music streaming. Open source. Forever free.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Audio Engine (ExoPlayer direct) ──
  media_kit: ^1.1.11
  media_kit_libs_android_audio: ^1.0.4
  media_kit_libs_windows_audio: ^1.0.4
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # ── Networking ──
  http: ^1.2.0
  youtube_explode_dart: ^2.3.6

  # ── Path ──
  path_provider: ^2.1.4

  # ── Local Database ──
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Firebase ──
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── UI ──
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  palette_generator: ^0.3.3
  provider: ^6.1.2
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

  # ── Utils ──
  android_intent_plus: ^5.0.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#141414"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/